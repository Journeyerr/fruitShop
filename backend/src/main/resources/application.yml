server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: fruit-shop-backend
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/fruit_shop?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: root
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      auto-commit: true
      idle-timeout: 30000
      pool-name: FruitShopHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # Redis配置
#  redis:
#    host: localhost
#    port: 6379
#    password:
#    database: 0
#    timeout: 10000ms
#    lettuce:
#      pool:
#        min-idle: 0
#        max-idle: 10
#        max-active: 20
#        max-wait: -1ms

  # RabbitMQ配置
#  rabbitmq:
#    host: localhost
#    port: 5672
#    username: guest
#    password: guest
#    virtual-host: /
#    listener:
#      simple:
#        acknowledge-mode: manual
#        prefetch: 1
#        retry:
#          enabled: true
#          initial-interval: 1000ms
#          max-attempts: 3
#          max-interval: 10000ms
#          multiplier: 1

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.fruitshop.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: fruitshopsecretkey1234567890abcdefghijklmnopqrstuvwxyz
  expiration: 604800000
  header: Authorization
  prefix: Bearer

# 日志配置
logging:
  level:
    com.fruitshop: debug
    org.springframework: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/fruit-shop.log
    max-size: 10MB
    max-history: 30

# 小程序配置
wechat:
  appid: wxbxxxxxxxxxx
  secret:

# 业务配置
business:
  delivery:
    max-distance: 5
    free-delivery-amount: 59
    delivery-fee: 5

# SFTP配置
sftp:
  host: xx.xx.xx.xx
  port: 22
  username: root
#  password: ""
  remote-path: /var/www/oss/xx
  url-prefix: https://xxxxx
